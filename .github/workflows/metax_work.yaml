name: padlle metax gpu test

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize]
    branches: [develop, release/**]
    paths:
      - "**"
      - "!backends/**"
      - "backends/metax_gpu/**"

permissions: read-all

defaults:
  run:
    shell: bash

jobs:
  metax-gpu-test:
    runs-on: paddle-metax-runner-set
    steps:
      - name: Checkout repository
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BRANCH_NAME=${{ github.head_ref }}
          else
            BRANCH_NAME=${{ github.ref_name }}
          fi

          git clone \
            --reference-if-able /home/runner/PaddleCustomDevice \
            --depth=1 \
            --shallow-submodules \
            --jobs=8 \
            --branch $BRANCH_NAME \
            --recurse-submodules \
            https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git .


      - name: compile
        run: |
          cd backends/metax_gpu
          bash build.sh

      - name: run test
        run: |
          cd backends/metax_gpu/tests
          bash run_test.sh
